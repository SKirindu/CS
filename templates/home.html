{% extends 'base.html' %}
{% block title %}Workspace | BabyAlevel{% endblock %}

{% block content %}
<style>
  .portal-header-info {
    margin-bottom: 3.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .portal-header-info h2 {
    font-family: var(--font-heading);
    font-size: 2.2rem;
    font-weight: 800;
    margin: 0 0 1rem 0;
    letter-spacing: 0.1em;
    color: var(--text);
    text-transform: uppercase;
  }
  .portal-header-info p {
    font-size: 1rem;
    color: var(--text-muted);
    margin: 0;
    line-height: 1.6;
  }
  
  .level-switcher {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 4rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }
  .switcher-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-heading);
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.8rem 1.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.6em;
    letter-spacing: 0.1em;
  }
  .switcher-btn:hover {
    color: var(--text);
    border-color: var(--border-hover);
  }
  .switcher-btn.selected {
    color: var(--accent);
    border-color: var(--accent);
    background-color: rgba(212, 178, 133, 0.04);
  }
  
  .switcher-btn#olevelBtn.selected {
    color: var(--olevel-accent);
    border-color: var(--olevel-accent);
    background-color: rgba(255, 215, 0, 0.04);
  }

  .topics-section {
    display: none;
    flex-direction: column;
    animation: fadeIn 0.4s ease forwards;
  }
  .section-divider-label {
    font-family: var(--font-heading);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 2.2rem;
    text-transform: uppercase;
  }
  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.5rem;
    width: 100%;
  }
  
  .topic-card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem 1.6rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    animation: slideUp 0.3s ease forwards;
    min-height: 180px;
  }
  
  .topic-card:hover {
    border-color: var(--accent);
    background-color: var(--surface-hover);
  }
  
  .topics-grid.olevel-grid .topic-card:hover {
    border-color: var(--olevel-accent);
  }

  .topic-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .topic-card-icon {
    font-size: 1.5rem;
    color: var(--accent);
  }
  
  .topics-grid.olevel-grid .topic-card-icon {
    color: var(--olevel-accent);
  }

  .topic-card-num {
    font-family: var(--font-heading);
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 600;
  }
  
  .topic-card-name {
    font-family: var(--font-heading);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.4;
    text-transform: uppercase;
    color: #ffffff;
  }
  
  .topic-card-link {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.4em;
    margin-top: auto;
    transition: color 0.2s ease;
  }
  
  .topic-card:hover .topic-card-link {
    color: var(--accent);
  }
  
  .topics-grid.olevel-grid .topic-card:hover .topic-card-link {
    color: var(--olevel-accent);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes slideUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 768px) {
    .portal-header-info h2 {
      font-size: 1.8rem;
    }
    .level-switcher {
      flex-direction: column;
      gap: 1rem;
    }
    .switcher-btn {
      width: 100%;
      justify-content: center;
    }
  }
</style>

<div class="portal-header-info">
  <h2>Student Workspace</h2>
  <p>Select your course curriculum below to access standard directories, practice files, and study resources.</p>
</div>

<div class="level-switcher">
  <button class="switcher-btn" id="olevelBtn">
    <i class="fas fa-graduation-cap"></i> O Level Course
  </button>
  <button class="switcher-btn" id="alevelBtn">
    <i class="fas fa-book-reader"></i> A Level Course
  </button>
</div>

<div id="topicsContainer" class="topics-section">
  <div class="section-divider-label" id="topicsLevelTitle">Topics</div>
  <div id="topicsGrid" class="topics-grid"></div>
</div>

<script>
  const olevelSections = [
    { name: 'Data Repre', icon: '💾' },
    { name: 'Communications', icon: '📡' },
    { name: 'Hardware', icon: '🖥️' },
    { name: 'Software', icon: '💻' },
    { name: 'Security', icon: '🔒' },
    { name: 'Ethics', icon: '⚖️' },
    { name: 'Databases', icon: '🗄️' },
    { name: 'AI', icon: '🤖' },
    { name: 'Data Types', icon: '🔢' },
    { name: 'Algo desgn and problem solving', icon: '🧩' },
    { name: 'Programming', icon: '👨‍💻' },
    { name: 'Software Devolopment', icon: '🛠️' },
    { name: 'Computational thinking', icon: '🧠' }
  ];

  const alevelSections = [
    { name: 'Data Representation', icon: '💾', path: '/alevel/data_representation' },
    { name: 'Communications', icon: '📡', path: '/alevel/communications' },
    { name: 'Hardware', icon: '🖥️', path: '/alevel/hardware' },
    { name: 'Software', icon: '💻', path: '/alevel/software' },
    { name: 'Security', icon: '🔒', path: '/alevel/security' },
    { name: 'Ethics', icon: '⚖️', path: '/alevel/ethics' },
    { name: 'Databases', icon: '🗄️', path: '/alevel/databases' },
    { name: 'Programming', icon: '👨‍💻', path: '/alevel/programming' },
    { name: 'Data Types', icon: '🔢', path: '/alevel/data_types' },
    { name: 'Algo desgn', icon: '🧩', path: '/alevel/algo_desgn' },
    { name: 'Software Devolopment', icon: '🛠️', path: '/alevel/software_devolopment' }
  ];

  const olevelBtn = document.getElementById('olevelBtn');
  const alevelBtn = document.getElementById('alevelBtn');

  olevelBtn.onclick = function() {
    this.classList.add('selected');
    alevelBtn.classList.remove('selected');
    renderTopicsMenu(olevelSections, true);
  };

  alevelBtn.onclick = function() {
    this.classList.add('selected');
    olevelBtn.classList.remove('selected');
    renderTopicsMenu(alevelSections, false);
  };

  function renderTopicsMenu(sections, isOlevel) {
    const container = document.getElementById('topicsContainer');
    const grid = document.getElementById('topicsGrid');
    const levelTitle = document.getElementById('topicsLevelTitle');

    levelTitle.textContent = isOlevel ? 'O Level Course Directory' : 'A Level Course Directory';
    grid.className = 'topics-grid' + (isOlevel ? ' olevel-grid' : '');
    grid.innerHTML = '';

    sections.forEach((sec, idx) => {
      const item = document.createElement(sec.path ? 'a' : 'div');
      item.className = 'topic-card';
      if (sec.path) {
        item.href = sec.path;
      }

      // Card Header
      const cardHeader = document.createElement('div');
      cardHeader.className = 'topic-card-header';
      
      const iconSpan = document.createElement('span');
      iconSpan.className = 'topic-card-icon';
      iconSpan.textContent = sec.icon || '📚';
      
      const numSpan = document.createElement('span');
      numSpan.className = 'topic-card-num';
      numSpan.textContent = (idx + 1).toString().padStart(2, '0');
      
      cardHeader.appendChild(iconSpan);
      cardHeader.appendChild(numSpan);

      // Card Name
      const nameSpan = document.createElement('div');
      nameSpan.className = 'topic-card-name';
      nameSpan.textContent = sec.name;

      // Card Link indicator
      const linkSpan = document.createElement('div');
      linkSpan.className = 'topic-card-link';
      linkSpan.innerHTML = sec.path ? 'Open Directory <i class="fas fa-arrow-right"></i>' : 'Inactive Module';

      item.appendChild(cardHeader);
      item.appendChild(nameSpan);
      item.appendChild(linkSpan);

      // Apply staggering animation delays
      item.style.animationDelay = (idx * 0.02) + 's';

      grid.appendChild(item);
    });

    container.style.display = 'flex';
    
    // Smooth scrolling to topics list
    setTimeout(() => {
      container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
</script>
{% endblock %}
