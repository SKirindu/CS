{% extends 'base.html' %}
{% block title %}Login | BabyAlevel{% endblock %}

{% block content %}
<style>
  .auth-wrapper {
    max-width: 400px;
    margin: 4rem auto;
  }
  .auth-card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3.5rem 2.5rem;
  }
  .auth-card h3 {
    font-family: var(--font-heading);
    font-size: 1.8rem;
    font-weight: 800;
    margin: 0 0 2rem 0;
    letter-spacing: 0.15em;
    color: var(--text);
    text-transform: uppercase;
    text-align: center;
  }
  .form-group {
    margin-bottom: 1.5rem;
    position: relative;
  }
  .form-group i {
    position: absolute;
    left: 1.1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.95rem;
    transition: color 0.2s ease;
  }
  .form-control {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    background-color: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--text);
    box-sizing: border-box;
    transition: all 0.2s ease;
    outline: none;
  }
  .form-control:focus {
    border-color: var(--accent);
    background-color: var(--surface-hover);
  }
  .form-control:focus + i {
    color: var(--accent);
  }
  .btn-submit {
    width: 100%;
    padding: 0.9rem;
    background-color: var(--accent);
    border: none;
    color: var(--bg);
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5em;
    margin-top: 1rem;
    letter-spacing: 0.05em;
  }
  .btn-submit:hover {
    background-color: #e2c29b;
  }
  .auth-footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .auth-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
    transition: color 0.2s ease;
  }
  .auth-footer a:hover {
    color: var(--text);
    text-decoration: underline;
  }
  .error-message {
    background-color: rgba(201, 122, 100, 0.1);
    border: 1px solid rgba(201, 122, 100, 0.3);
    color: #f28b82;
    padding: 0.8rem 1.2rem;
    border-radius: 6px;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.6em;
  }
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <h3>Login</h3>
    {% if error %}
      <div class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
      </div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <input type="text" name="username" class="form-control" placeholder="Username" required autofocus />
        <i class="fas fa-user"></i>
      </div>
      <div class="form-group">
        <input type="password" name="password" class="form-control" placeholder="Password" required />
        <i class="fas fa-lock"></i>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-sign-in-alt"></i> Log In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
